name: C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up GCC
      uses: egor-tensin/setup-gcc@v1
      with:
        version: latest
        platform: x64

    - name: Build with Make
      run: make

    - name: Clean Make build
      run: make clean

    - name: Build with CMake
      run: |
        cmake -B build
        cmake --build build

    - name: Run solver
      run: ./build/maze_solver
